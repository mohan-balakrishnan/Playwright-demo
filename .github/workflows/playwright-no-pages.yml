name: Playwright Tests (No Pages)

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npm test
      continue-on-error: true

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 30
    
    - name: Publish Test Results Summary
      if: always()
      run: |
        if [ -f test-results/results.json ]; then
          echo "## 📊 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Test execution completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Available Artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "- **HTML Report**: Download \`playwright-report\` artifact and open index.html" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Results**: Download \`test-results\` artifact (videos, traces, screenshots)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 How to View Report:" >> $GITHUB_STEP_SUMMARY
          echo "1. Scroll down to **Artifacts** section" >> $GITHUB_STEP_SUMMARY
          echo "2. Download **playwright-report**" >> $GITHUB_STEP_SUMMARY
          echo "3. Extract the ZIP file" >> $GITHUB_STEP_SUMMARY
          echo "4. Open **index.html** in your browser" >> $GITHUB_STEP_SUMMARY
        fi
